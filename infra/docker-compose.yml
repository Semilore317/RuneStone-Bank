services:
  db:
    image: postgres:15-alpine
    container_name: runestone-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: runestone_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d runestone_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - runestone-network

  app:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.dev
    container_name: runestone-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/runestone_bank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_PASSWORD: ${APP_PASSWORD}
    networks:
      - runestone-network

volumes:
  postgres_data:

networks:
  runestone-network:
    driver: bridge
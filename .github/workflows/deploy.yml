name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    #tell every step in this job to start inside the 'server' folder
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build Native Image with Maven
        run: ./mvnw -Pnative native:compile -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # added dockerhub username and token to Github Secrets
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/runestone-bank:latest -f Dockerfile.prod .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/runestone-bank:latest
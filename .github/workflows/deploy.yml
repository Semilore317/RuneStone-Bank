name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    #tell every step in this job to start inside the 'server' folder
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven' # prevent redownloading dependencies

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build Native Image with Maven
        run: ./mvnw -Pnative native:compile -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # added dockerhub username and token to Github Secrets
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/runestone-bank:latest -f ../infra/Dockerfile.prod .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/runestone-bank:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/RuneStone-Bank
            git pull origin master
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Export secrets for docker-compose
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export APP_PASSWORD=${{ secrets.APP_PASSWORD }}

            # pull ONLY the new app image, leave the DB image alone
            docker-compose -f infra/docker-compose.prod.yml pull app

            #  re-create ONLY the app container.
            # --no-deps ensures we don't restart the DB (zero downtime for data)
            docker-compose -f infra/docker-compose.prod.yml up -d --no-deps app

            #  cleanup old images to save disk space on the drive
            docker image prune -f